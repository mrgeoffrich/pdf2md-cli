name: Release

on:
  push:
    tags: ["v*"]

jobs:
  build:
    permissions:
      contents: read
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            artifact: pdf2md-linux-x86_64
          - os: macos-latest
            artifact: pdf2md-macos-arm64
          - os: windows-latest
            artifact: pdf2md-windows-x86_64.exe
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Build binary
        run: |
          pyinstaller \
            --onefile \
            --name pdf2md \
            --collect-all pymupdf \
            --hidden-import pymupdf4llm \
            --exclude-module pytesseract \
            --exclude-module pdf2image \
            --exclude-module tkinter \
            pdf2md/__main__.py
        shell: bash

      - name: Smoke test (Unix)
        if: runner.os != 'Windows'
        run: ./dist/pdf2md --version

      - name: Smoke test (Windows)
        if: runner.os == 'Windows'
        run: dist\pdf2md.exe --version

      - name: Rename artifact
        run: |
          if [ "${{ runner.os }}" = "Windows" ]; then
            mv dist/pdf2md.exe dist/${{ matrix.artifact }}
          else
            mv dist/pdf2md dist/${{ matrix.artifact }}
          fi
        shell: bash

      - name: Generate checksum
        run: sha256sum dist/${{ matrix.artifact }} > dist/${{ matrix.artifact }}.sha256
        shell: bash

      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: ${{ matrix.artifact }}
          path: |
            dist/${{ matrix.artifact }}
            dist/${{ matrix.artifact }}.sha256

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create release
        uses: softprops/action-gh-release@153bb8e04406b158c6c84fc1615b65b24149a1fe # v2
        with:
          files: artifacts/*
          generate_release_notes: true
